name: Process staging Podcast ad plan

on:
  workflow_dispatch:
    inputs:
      plan_manifest:
        description: Signed-in admin processorManifest JSON from isolated staging
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: staging-ad-plan
  cancel-in-progress: false

jobs:
  segment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: podcast-staging
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      MEDIA_PROCESSOR_CALLBACK_SECRET: ${{ secrets.MEDIA_PROCESSOR_CALLBACK_SECRET }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate isolated-staging manifest
        id: plan
        env:
          PLAN_MANIFEST: ${{ inputs.plan_manifest }}
        run: node scripts/prepare-ad-plan-workflow.mjs

      - name: Verify media tools
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Download private episode source
        run: >-
          npx wrangler r2 object get
          "${{ steps.plan.outputs.bucket_name }}/${{ steps.plan.outputs.source_key }}"
          --file work/ad-plan/source
          --remote
          --env staging

      - name: Normalize and split at approved marker intent
        run: >-
          node scripts/build-ad-plan-segments.mjs
          --manifest work/ad-plan/plan.json
          --source work/ad-plan/source
          --output work/ad-plan/segments
          --callback-body work/ad-plan/callback.json

      - name: Upload private frame-aligned program segments
        run: |
          node --input-type=module -e '
            import { readFileSync, writeFileSync } from "node:fs";
            const body = JSON.parse(readFileSync("work/ad-plan/callback.json", "utf8"));
            writeFileSync(
              "work/ad-plan/uploads.tsv",
              body.segments.map((segment) =>
                `${segment.objectKey}\twork/ad-plan/segments/program-${segment.sequence}-${segment.sha256}.mp3`
              ).join("\n") + "\n"
            );
          '
          while IFS=$'\t' read -r object_key source_file; do
            npx wrangler r2 object put \
              "${{ steps.plan.outputs.bucket_name }}/${object_key}" \
              --file "$source_file" \
              --content-type audio/mpeg \
              --remote \
              --env staging \
              --force
          done < work/ad-plan/uploads.tsv

      - name: Sign validation evidence
        id: signature
        run: >-
          node scripts/sign-ad-plan-callback.mjs
          work/ad-plan/callback.json
          >> "$GITHUB_OUTPUT"

      - name: Submit evidence for human review
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "content-type: application/json" \
            --header "x-podcast-processor-timestamp: ${{ steps.signature.outputs.timestamp }}" \
            --header "x-podcast-processor-signature: ${{ steps.signature.outputs.signature }}" \
            --data-binary @work/ad-plan/callback.json \
            "${{ steps.plan.outputs.callback_url }}"

      - name: Retain non-secret processing report
        uses: actions/upload-artifact@v7
        with:
          name: ad-plan-${{ steps.plan.outputs.plan_id }}-report
          path: work/ad-plan/callback.json
          if-no-files-found: error
          retention-days: 30
